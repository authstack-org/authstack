{% extends "admin/_layout.html" %}

{% block title %}Sign in — Authstack Admin{% endblock %}

{% block nav %}
<nav>
    <span class="brand">Authstack Admin</span>
    <div class="nav-right"></div>
</nav>
{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <h1 style="text-align: center; margin-bottom: 8px;">Sign in</h1>
    <p style="text-align: center; color: #666; font-size: 0.875rem; margin-bottom: 24px;">Admin access only</p>
    <div class="card">
        {% if let Some(error) = error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus
                       value="{% if let Some(e) = email %}{{ e }}{% endif %}">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Sign in</button>
        </form>
    </div>
</div>
{% endblock %}
