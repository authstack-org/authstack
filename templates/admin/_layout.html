<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Authstack Admin{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"></script>
</head>
<body class="min-h-screen bg-background">
    <div class="flex min-h-screen">
        <aside class="hidden w-64 shrink-0 border-r bg-muted/30 md:flex md:flex-col">
            <div class="flex h-14 items-center border-b px-6">
                <span class="text-sm font-semibold tracking-tight">Authstack Admin</span>
            </div>
            <nav class="flex flex-1 flex-col gap-1 p-4 text-sm">
                <a href="/admin/dashboard"
                   class="flex items-center rounded-md px-3 py-2 font-medium transition-colors hover:bg-accent hover:text-accent-foreground {% block nav_dashboard %}{% endblock %}">
                    Applications
                </a>
                {% block nav_operators_link %}{% endblock %}
            </nav>
            <div class="border-t p-4 text-xs text-muted-foreground">
                Signed in as<br>
                <span class="font-medium text-foreground">{% block nav_email %}{% endblock %}</span>
            </div>
        </aside>

        <div class="flex min-w-0 flex-1 flex-col">
            <header class="flex h-14 items-center justify-between border-b px-4 md:px-6">
                <div class="md:hidden text-sm font-semibold">Authstack Admin</div>
                <div class="flex items-center gap-3 md:ml-auto">
                    <span class="hidden text-sm text-muted-foreground sm:inline">{% block header_email %}{% endblock %}</span>
                    {% block nav_logout %}{% endblock %}
                </div>
            </header>

            <main class="flex-1 p-4 md:p-6">
                {% block breadcrumb %}{% endblock %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
