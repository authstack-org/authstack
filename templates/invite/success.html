<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — {{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="min-h-screen bg-background">
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-md rounded-lg border border-emerald-200 bg-emerald-50 p-6 text-center shadow-sm">
            <h1 class="text-2xl font-semibold tracking-tight text-emerald-900">You're in!</h1>
            <p class="mt-2 text-sm text-emerald-800">
                <strong>{{ email }}</strong> has joined <strong>{{ organization_name }}</strong> on {{ app_name }}.
            </p>
            <p class="mt-4 text-sm text-emerald-700">You can close this page and sign in to the app.</p>
        </div>
    </div>
</body>
</html>
