services:
  db:
    image: postgres:16-alpine
    container_name: aegis_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: aegis_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/aegis
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AEGIS_ADMIN_KEY: change_me_in_production
      RUST_LOG: info
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/.well-known/jwks.json -o /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  tests:
    build: ./tests
    container_name: aegis_tests
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8080
      AEGIS_ADMIN_KEY: change_me_in_production
    profiles:
      - test

volumes:
  pgdata:
