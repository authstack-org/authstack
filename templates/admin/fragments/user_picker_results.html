{% for user in users %}
<button type="button"
        class="flex w-full items-center justify-between rounded-md px-3 py-2 text-left text-sm hover:bg-accent"
        data-on:click="$picker_user_id = '{{ user.id }}'; $picker_label = '{{ user.name }} ({{ user.email }})'; $picker_query = ''">
    <span class="font-medium">{{ user.name }}</span>
    <span class="text-muted-foreground">{{ user.email }}</span>
</button>
{% endfor %}
{% if users.is_empty() %}
<p class="px-3 py-2 text-sm text-muted-foreground">No users found.</p>
{% endif %}
