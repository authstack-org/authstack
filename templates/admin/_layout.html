<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Authstack Admin{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #111; }
        nav { background: #111; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; }
        nav .brand { font-weight: 700; font-size: 1.1rem; letter-spacing: 0.02em; }
        nav .nav-right { display: flex; align-items: center; gap: 16px; font-size: 0.875rem; color: #aaa; }
        nav form button { background: none; border: 1px solid #444; color: #ccc; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
        nav form button:hover { border-color: #888; color: #fff; }
        main { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 24px; }
        .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: #111; color: #fff; }
        .btn-primary:hover { background: #333; }
        .btn-secondary { background: #fff; color: #111; border: 1px solid #e5e5e5; }
        .btn-secondary:hover { background: #f5f5f5; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 8px 12px; border: 1px solid #e5e5e5; border-radius: 6px;
            font-size: 0.875rem; outline: none;
        }
        input:focus { border-color: #111; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 10px 14px; border-radius: 6px; font-size: 0.875rem; margin-bottom: 16px; }
        .success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; padding: 10px 14px; border-radius: 6px; font-size: 0.875rem; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #e5e5e5; font-weight: 600; color: #555; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 500; background: #f0f0f0; color: #555; }
        .empty { text-align: center; color: #999; padding: 40px; }
        .secret-box { font-family: monospace; background: #f5f5f5; padding: 10px 14px; border-radius: 6px; border: 1px solid #e5e5e5; word-break: break-all; font-size: 0.85rem; }
    </style>
</head>
<body>
    {% block nav %}
    <nav>
        <span class="brand">Authstack Admin</span>
        <div class="nav-right">
            <span>{% block nav_email %}{% endblock %}</span>
            {% block nav_logout %}{% endblock %}
        </div>
    </nav>
    {% endblock %}
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
